{% extends "base.html" %}

{% block content %}
    <div class="form-box">
        {% if error_msg %}
        <p class="message">{{ error_msg }}</p>
        {% else %}
        <p class="message">&nbsp;</p>
        {% endif %}

        <form action="{{ url_for('post_login') }}" method="post">
        <br>
        <label for="username">Brukernavn</label>
        <input id="username" name="username" required value="{{ form.username if form }}">
        <br>
        <label for="password">Passord</label>
        <input id="password" type="password" name="password" required value="{{ form.password if form }}">
        <br>
        <input type="submit">
    </form>

    {% if redirect_to %}
    <p>Sender deg til {{ redirect_to }}</p>
    {% endif %}

    </div>

{% endblock %}
